name = "robynn-mcp-server"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[vars]
ROBYNN_API_BASE_URL = "https://robynn.ai"
MCP_PUBLIC_BASE_URL = "https://mcp.robynn.ai"
CONNECTOR_STATE_SECRET = "970e7bc2624b210ed012f0e955d17dd7c3c921dbf0e7f7156d7bfb400f9b0e84"
MCP_SERVER_NAME = "Robynn"
MCP_SERVER_VERSION = "0.1.5"

[[kv_namespaces]]
binding = "OAUTH_KEY"
id = "5727f263cda54e439bd998f618878b18"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "5727f263cda54e439bd998f618878b18"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "RobynnMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RobynnMCP"]

# R2 binding: read-only access to the vault bucket the materializer cron
# writes to (robynnv3 /api/cron/vault-materializer). Bind directly so the
# Worker reads via env.VAULT.get / .list with no IAM tokens crossing the
# wire. Per-org gating happens in the tool handler against
# this.props.organizationId from the OAuth session.
[[r2_buckets]]
binding = "VAULT"
bucket_name = "robynn-materialized"

# Uncomment when deploying with custom domain:
# [[routes]]
# pattern = "mcp.robynn.ai/*"
# custom_domain = true
